<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Gallery</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="overlay">
    <h1>Living Gallery</h1>
    <div class="subtitle">A Museum After Hours</div>
    <div class="controls">
      <span class="key">↑ ↓ ← →</span><span>Move</span>
      <span class="key">Z</span><span>Crouch (toggle)</span>
      <span class="key">X</span><span>Prone (toggle)</span>
      <span class="key">Trackpad</span><span>Look</span>
    </div>
    <div class="prompt">Click to begin</div>
  </div>

  <div id="crosshair"></div>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
